; ================================================================
; DX9 FFP Proxy - Runtime Configuration
;
; Place this file next to d3d9.dll in the game directory.
; ================================================================

[Remix]
; Chain-load RTX Remix's d3d9 DLL after our proxy.
; Set Enabled=0 to disable chain loading (proxy only, no Remix).
Enabled=1

; Name of the Remix DLL to load. Typically d3d9_remix.dll for
; Remix runtime builds, or dxvk-remix.dll for some setups.
DLLName=d3d9.dll.bak

[Preload]
; Side-effect DLLs to load at startup (e.g. SilentPatch, mods).
; Set to empty or remove to skip.
DLL=

[FFP]
; Which texture stage holds the albedo/diffuse texture.
; Some engines bind the main texture to stage 1+ instead of stage 0.
; The proxy will copy it to stage 0 for FFP draws.
; Use diagnostic logging + the analysis scripts to discover this.
; Common values: 0 (most engines), 1 (some Japanese engines)
AlbedoStage=0
; Strip non-albedo texture stages (1..7) during FFP draws.
; Useful for disabling normal/spec/detail maps that break Remix materials.
DisableNormalMaps=0
; Allow skinned draws through FFP indexed blending when bone matrices exist.
; Leave off unless you are explicitly testing character geometry.
ForceFfpSkinned=0
; Allow rigid draws without TEXCOORD0 to enter FFP mode.
; Useful for geometry-only debugging when hashes matter more than texturing.
ForceFfpNoTexcoord=0
; Leave the live frustum matrix untouched. The EXE patch already disables the
; fixed threshold path, and mutating the shared VP matrix destabilizes camera
; and texture projection.
FrustumPatch=0
; XY clamp for the optional frustum-matrix patch in 1e-6 units.
FrustumScaleMicros=100
