# Tomb Raider Legend — RTX Remix Configuration
# Authoritative template deployed by run.py on every build

# Transform — proxy provides separated W/V/P via SetTransform
rtx.fusedWorldViewMode = 0
rtx.useWorldMatricesForShaders = True
rtx.zUp = True
rtx.sceneScale = 0.0001

# Vertex capture OFF — proxy expands SHORT4 → FLOAT3 on CPU, draws in FFP mode.
# Eliminates VS constant hashing that caused per-frame hash instability.
rtx.useVertexCapture = False

# Ray tracing
rtx.enableRaytracing = True
rtx.enableReplacementAssets = True

# Hash stability — with CPU-side SHORT4 expansion and useVertexCapture=False,
# Remix reads stable model-space FLOAT3 positions from the vertex buffer.
# Positions can now be included for more unique, robust hashes.
rtx.geometryAssetHashRuleString = positions,indices,texcoords,geometrydescriptor
rtx.geometryGenerationHashRuleString = positions,indices,texcoords,geometrydescriptor,vertexlayout,vertexshader
rtx.calculateAxisAlignedBoundingBox = True
rtx.hashCollisionDetection = False

# Anti-culling — DISABLED: causes freeze with TRL (see feedback_anticulling_off memory).
# The draw replay cache in the proxy handles anchor persistence instead.
rtx.antiCulling.object.enable = False
rtx.antiCulling.object.numFramesToExtendObjectLifetime = 60
rtx.antiCulling.object.numObjectsToKeep = 1000
rtx.antiCulling.object.fovScale = 1.5
rtx.antiCulling.object.enableHighPrecisionAntiCulling = False
rtx.antiCulling.object.enableInfinityFarPlane = False
rtx.antiCulling.object.hashInstanceWithBoundingBoxHash = False

# Anti-culling for lights — disabled (freeze)
rtx.antiCulling.light.enable = False
rtx.antiCulling.light.numFramesToExtendLightLifetime = 60
rtx.antiCulling.light.fovScale = 2.0

# Fallback lighting — dim so mod-placed colored lights are clearly visible
rtx.fallbackLightMode = 1
rtx.fallbackLightRadiance = 5.0 5.0 5.0
rtx.fallbackLightDirection = -70.5 1.5 -326.9


# UI detection
rtx.orthographicIsUI = True
rtx.uiTextures = 0x03016D2FBBF5C65D, 0x2164293A60D148AC

# Sky
rtx.skyBoxTextures = 0x443B45FB9971FC90, 0x78AD1D0EDA0FFC21, 0x8405ADDE0AE29A5F
rtx.skyBrightness = 0.01

# Terrain
rtx.terrain.terrainAsDecalsEnabledIfNoBaker = True
rtx.terrain.terrainAsDecalsAllowOverModulate = False
rtx.terrainBaker.enableBaking = False

# Near plane
rtx.enableNearPlaneOverride = True
rtx.nearPlaneOverride = 0.1

# Capture
rtx.captureInstances = True
rtx.captureShowMenuOnHotkey = False

# Debug — disabled for performance; test harness overrides when needed
rtx.enableDebugMode = False
rtx.debugView.debugViewIdx = 0
rtx.debugView.composite.compositeViewIdx = 0
rtx.remixMenuKeyBinds = X

# DLSS — Balanced mode (~57% render resolution, significant FPS boost)
rtx.qualityDLSS = 2
