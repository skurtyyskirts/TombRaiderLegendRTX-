; remix-comp configuration
; Adapted from xoxor4d/remix-comp-base by kim2091 for Vibe Reverse Engineering

[Remix]
Enabled=1
DLLName=d3d9_remix.dll

[Chain]
PreloadDLL=

; ============================================================
; FFP Conversion Settings
;
; Set Enabled=0 to disable FFP conversion entirely (passthrough mode).
; Useful for tracing or non-FFP mods.
; ============================================================
[FFP]
Enabled=1
AlbedoStage=0

; ============================================================
; VS Constant Register Layout (GAME-SPECIFIC)
;
; These define which vertex shader constant registers hold the
; View, Projection, and World matrices. Every game engine uses
; different register assignments. Discover yours with:
;
;   python rtx_remix_tools/dx/scripts/find_vs_constants.py <game.exe>
;   python -m graphics.directx.dx9.tracer analyze <capture.jsonl> --shader-map
;
; Common patterns:
;   View+Proj often adjacent (c0-c7 or c4-c11)
;   World matrix at a fixed register (c0, c8, c16, etc.)
;   Bone palette starts after world, 3 or 4 regs per bone
; ============================================================
[FFP.Registers]
ViewStart=0
ViewEnd=4
ProjStart=4
ProjEnd=8
WorldStart=16
WorldEnd=20
BoneThreshold=20
RegsPerBone=3
BoneMinRegs=3

; ============================================================
; Skinning (OFF by default)
;
; Only enable after rigid FFP geometry works correctly.
; See documentation for skinning setup workflow.
; ============================================================
[Skinning]
Enabled=0

; ============================================================
; Diagnostic Logging
;
; Writes ffp_proxy.log after DelayMs milliseconds.
; Logs LogFrames frames of draw call data for debugging.
; Do NOT change the delay -- it ensures the game is in-game
; with real geometry before logging begins.
; ============================================================
[Diagnostics]
Enabled=1
DelayMs=50000
LogFrames=3

; ============================================================
; Frame Tracer
;
; Integrated D3D9 call tracer. Captures all API calls to JSONL
; for offline analysis with:
;   python -m graphics.directx.dx9.tracer analyze <file.jsonl> --summary
;
; FFP is automatically disabled during capture to record
; the game's unmodified calls.
; ============================================================
[Tracer]
BacktraceDepth=8
OutputDir=captures
