; remix-comp-proxy configuration (d3d9.dll proxy)
; Adapted from xoxor4d/remix-comp-base by kim2091 for Vibe Reverse Engineering

[Remix]
Enabled=1
DLLName=d3d9_remix.dll

; ============================================================
; DLL/ASI Chain Loading
;
; PreLoad:  Loaded during DllMain, before the d3d9 chain.
; PostLoad: Loaded after the game window is found.
;
; Semicolon-separated. Paths relative to the game directory.
; Supports .dll and .asi files.
;
; Example: PreLoad=patch.dll;fix.asi
; ============================================================
[Chain]
PreLoad=
PostLoad=

; ============================================================
; FFP Conversion Settings
;
; Set Enabled=0 to disable FFP conversion entirely (passthrough mode).
; Useful for tracing or non-FFP mods.
; ============================================================
[FFP]
Enabled=1
AlbedoStage=0

; ============================================================
; Skinning (OFF by default)
;
; Only enable after rigid FFP geometry works correctly.
; See documentation for skinning setup workflow.
; ============================================================
[Skinning]
Enabled=0

; ============================================================
; Diagnostic Logging
;
; AutoCapture: Writes rtx_comp\diagnostics.log after DelayMs milliseconds.
; Logs LogFrames frames of draw call data for debugging.
; The delay ensures the game is in-game with real geometry.
;
; On-demand capture is always available from the ImGui overlay
; (F4 -> Diagnostics tab) regardless of AutoCapture setting.
;
; Log categories control what data is captured.
; All categories default to ON. Disable to reduce log noise.
; ============================================================
[Diagnostics]
Enabled=1
AutoCapture=1
DelayMs=50000
LogFrames=3
LogDrawCalls=1
LogVSConstants=1
LogVertexData=1
LogDeclarations=1
LogTextures=1
LogPresentInfo=1

; ============================================================
; Frame Tracer
;
; Integrated D3D9 call tracer. Captures all API calls to JSONL
; for offline analysis with:
;   python -m graphics.directx.dx9.tracer analyze <file.jsonl> --summary
;
; FFP is automatically disabled during capture to record
; the game's unmodified calls.
; ============================================================
[Tracer]
BacktraceDepth=8
OutputDir=captures
