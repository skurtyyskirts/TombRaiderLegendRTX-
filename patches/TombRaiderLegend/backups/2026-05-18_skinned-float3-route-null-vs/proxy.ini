; ================================================================
; DX9 FFP Proxy - Runtime Configuration
;
; Place this file next to d3d9.dll in the game directory.
; ================================================================

[Remix]
; Chain-load RTX Remix's d3d9 DLL after our proxy.
; Set Enabled=0 to disable chain loading (proxy only, no Remix).
Enabled=1

; Name of the Remix DLL to load. Typically d3d9_remix.dll for
; Remix runtime builds, or dxvk-remix.dll for some setups.
DLLName=d3d9_remix.dll

[Chain]
; Side-effect DLLs to load at startup (e.g. SilentPatch, mods).
; Set to empty or remove to skip.
PreloadDLL=

[FFP]
; Which texture stage holds the albedo/diffuse texture.
; Some engines bind the main texture to stage 1+ instead of stage 0.
; The proxy will copy it to stage 0 for FFP draws.
; Use diagnostic logging + the analysis scripts to discover this.
; Common values: 0 (most engines), 1 (some Japanese engines)
AlbedoStage=0

; FLOAT3 routing:
; auto    = shader route when effective rtx.useVertexCapture is on, else null_vs
; null_vs = force legacy null-VS fallback
; shader  = force shader route
Float3RoutingMode=auto

; Normalize skinned vertex declarations for Remix:
; When a skinned draw hits the null-VS FFP path, swap to a clone of the decl with
; BLENDWEIGHT/BLENDINDICES removed (same offsets/types for everything else). This
; stabilizes Remix's `geometrydescriptor` hash component so character meshes (e.g.
; Lara) get a fixed asset hash across LODs and weight-type variance. The game's
; own shader path keeps the original decl. Set to 0 to A/B test against this fix.
NormalizeSkinnedDecl=1

[Sky]
; Sky hash isolation for Remix tagging:
; clone candidate sky textures with a one-bit mutation to avoid world contamination.
EnableIsolation=1
CandidateMinVerts=12000
CandidateMinPrims=30
WarmupScenes=300
