# Tomb Raider Legend — RTX Remix Configuration
# Authoritative template deployed by run.py on every build

# Transform — proxy provides separated W/V/P via SetTransform
rtx.fusedWorldViewMode = 0
rtx.zUp = True
rtx.sceneScale = 0.0001

# Vertex capture — required for SHORT4 positions decoded by game's VS
rtx.useVertexCapture = True

# Ray tracing
rtx.enableRaytracing = True
rtx.enableReplacementAssets = True

# Hash stability — exclude positions (change with camera in vertex capture mode).
# Valid tokens: positions, legacypositions0/1, texcoords, indices, legacyindices,
#   geometrydescriptor, vertexlayout, vertexshader.
# With useVertexCapture=True, positions are post-VS and frame-varying — excluded.
rtx.geometryAssetHashRuleString = indices,texcoords,geometrydescriptor
rtx.geometryGenerationHashRuleString = positions,indices,texcoords,geometrydescriptor,vertexlayout,vertexshader
rtx.calculateAxisAlignedBoundingBox = True
rtx.hashCollisionDetection = True

# Anti-culling — retain geometry in RT accel structure after game stops drawing it.
# Extreme lifetime: anchor meshes submitted once at level load persist for entire session.
rtx.antiCulling.object.enable = True
rtx.antiCulling.object.numFramesToExtendObjectLifetime = 100000
rtx.antiCulling.object.numObjectsToKeep = 50000
rtx.antiCulling.object.fovScale = 5.0
rtx.antiCulling.object.enableHighPrecisionAntiCulling = True
rtx.antiCulling.object.enableInfinityFarPlane = True
rtx.antiCulling.object.hashInstanceWithBoundingBoxHash = False

# Anti-culling for lights — match object lifetime so lights outlive anchor geometry
rtx.antiCulling.light.enable = True
rtx.antiCulling.light.numFramesToExtendLightLifetime = 100000
rtx.antiCulling.light.fovScale = 5.0

# Fallback lighting — neutral white so we can distinguish stage lights from fallback
rtx.fallbackLightMode = 1
rtx.fallbackLightRadiance = 1.0 1.0 1.0
rtx.fallbackLightDirection = -70.5 1.5 -326.9

# UI detection
rtx.orthographicIsUI = True
rtx.uiTextures = 0x03016D2FBBF5C65D, 0x2164293A60D148AC

# Sky
rtx.skyBoxTextures = 0x443B45FB9971FC90, 0x78AD1D0EDA0FFC21, 0x8405ADDE0AE29A5F
rtx.skyBrightness = 0.01

# Terrain
rtx.terrain.terrainAsDecalsEnabledIfNoBaker = True
rtx.terrain.terrainAsDecalsAllowOverModulate = False
rtx.terrainBaker.enableBaking = False

# Near plane
rtx.enableNearPlaneOverride = True
rtx.nearPlaneOverride = 0.1

# Capture
rtx.captureInstances = True

# Debug — set dynamically by test harness
rtx.enableDebugMode = True
rtx.debugView.debugViewIdx = 0
rtx.debugView.composite.compositeViewIdx = 0
rtx.remixMenuKeyBinds = X
