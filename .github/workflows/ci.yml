name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.4.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run tests
        run: pytest tests/ -v --tb=short --basetemp "$RUNNER_TEMP/pytest-test-python-${{ matrix.python-version }}"

  test-trl-nightly:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Set up Python 3.12
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-trl-nightly.txt pytest
      - name: Run TRL nightly tests
        run: |
          $env:PYTHONPATH = "."
          pytest tests_trl/ -v --tb=short --basetemp "$env:RUNNER_TEMP\pytest-trl-nightly"

  build-trl-proxy:
    uses: ./.github/workflows/_build-dx9-proxy.yml
    with:
      proxy_dir: patches/TombRaiderLegend/proxy
      sources: 'd3d9_main.c d3d9_wrapper.c d3d9_device.c'
      def_file: d3d9.def
      output_name: d3d9.dll
      arch: x86
      artifact_name: trl-proxy
