name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Python tools (retools, livetools, automation scripts)
  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run tests
        run: pytest tests/ -v --tb=short --basetemp "$RUNNER_TEMP/pytest-test-python-${{ matrix.python-version }}"

  test-trl-nightly:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run TRL nightly tests
        env:
          PYTHONPATH: .
        run: pytest tests_trl/ -v --tb=short --basetemp "$env:RUNNER_TEMP\\pytest-trl-nightly"

  # Authoritative TRL proxy DLL build verification (MSVC x86, no CRT)
  build-trl-proxy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build authoritative TRL proxy DLL
        working-directory: patches/TombRaiderLegend/proxy
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x86
          cl.exe /nologo /O2 /Oi /fp:fast /GL /GS- /W3 /Zl /c /D "WIN32" /D "NDEBUG" d3d9_main.c
          cl.exe /nologo /O2 /Oi /fp:fast /GL /GS- /W3 /Zl /c /D "WIN32" /D "NDEBUG" d3d9_wrapper.c
          cl.exe /nologo /O2 /Oi /fp:fast /GL /GS- /W3 /Zl /c /D "WIN32" /D "NDEBUG" d3d9_device.c
          link.exe /nologo /DLL /NODEFAULTLIB /LTCG /ENTRY:_DllMainCRTStartup@12 /DEF:d3d9.def /OUT:d3d9.dll d3d9_main.obj d3d9_wrapper.obj d3d9_device.obj kernel32.lib
      - name: Verify authoritative TRL DLL
        working-directory: patches/TombRaiderLegend/proxy
        run: |
          if (!(Test-Path d3d9.dll)) { throw "d3d9.dll not found" }
          Write-Host "TRL proxy d3d9.dll built: $((Get-Item d3d9.dll).Length) bytes"
