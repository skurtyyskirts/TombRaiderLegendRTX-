name: Reusable - Idea Generation (Claude)

on:
  workflow_call:
    inputs:
      whiteboard_file:
        required: false
        type: string
        default: HANDOFF.md
      project_name:
        required: false
        type: string
        default: ''
      claude_model:
        required: false
        type: string
        default: claude-sonnet-4-6
      max_tokens:
        required: false
        type: number
        default: 2048
      linear_config_path:
        required: false
        type: string
        default: linear/config.json
      changelog_path:
        required: false
        type: string
        default: CHANGELOG.md
      prompt_path:
        required: false
        type: string
        default: .github/prompts/idea-generation.md
    secrets:
      ANTHROPIC_API_KEY:
        required: false
      LINEAR_API_KEY:
        required: false

jobs:
  generate-ideas:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check API key
        id: keycheck
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::notice::ANTHROPIC_API_KEY not set; skipping idea generation."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.keycheck.outputs.skip != 'true'
      - uses: actions/setup-python@v5
        if: steps.keycheck.outputs.skip != 'true'
        with:
          python-version: '3.11'
      - name: Build context, call Claude, push ideas
        if: steps.keycheck.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          WHITEBOARD_FILE: ${{ inputs.whiteboard_file }}
          PROJECT_NAME: ${{ inputs.project_name || github.event.repository.name }}
          CLAUDE_MODEL: ${{ inputs.claude_model }}
          MAX_TOKENS: ${{ inputs.max_tokens }}
          LINEAR_CONFIG_PATH: ${{ inputs.linear_config_path }}
          CHANGELOG_PATH: ${{ inputs.changelog_path }}
          PROMPT_PATH: ${{ inputs.prompt_path }}
        run: |
          python <<'PYEOF'
          import json, os, re, urllib.request
          from pathlib import Path

          proj = os.environ['PROJECT_NAME']
          wb_path = Path(os.environ['WHITEBOARD_FILE'])
          claude_md = Path('CLAUDE.md').read_text(encoding='utf-8') if Path('CLAUDE.md').exists() else ''
          whiteboard = wb_path.read_text(encoding='utf-8') if wb_path.exists() else ''
          changelog = ''
          cl_path = Path(os.environ['CHANGELOG_PATH'])
          if cl_path.exists():
              lines = cl_path.read_text(encoding='utf-8').splitlines()
              changelog = '\n'.join(lines[:80])

          ctx_parts = [
              f'# Project: {proj}',
              '',
              '## CLAUDE.md',
              claude_md[:3000],
              '',
              f'## Whiteboard ({wb_path.name})',
              whiteboard[:2500],
              '',
              '## Recent changelog',
              changelog[:2000],
              '',
          ]
          ctx = '\n'.join(ctx_parts)

          default_sys = (
              "You are a senior researcher. Given the project context, identify the 3-5 most promising "
              "under-explored approaches that could resolve an active blocker or advance the project. "
              "For each: 1) hypothesis (1-2 sentences), 2) why it likely helps given current evidence, "
              "3) concrete first step to test. Format as a numbered list. Be specific to this project's code."
          )
          ppath = os.environ.get('PROMPT_PATH', '')
          system_prompt = default_sys
          if ppath and Path(ppath).exists():
              system_prompt = Path(ppath).read_text(encoding='utf-8')

          payload = json.dumps({
              'model': os.environ['CLAUDE_MODEL'],
              'max_tokens': int(os.environ['MAX_TOKENS']),
              'system': system_prompt,
              'messages': [{'role': 'user', 'content': ctx}]
          }).encode()
          req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=payload,
              headers={
                  'Content-Type': 'application/json',
                  'x-api-key': os.environ['ANTHROPIC_API_KEY'],
                  'anthropic-version': '2023-06-01'
              }
          )
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
          ideas = data['content'][0]['text']
          Path('/tmp/ideas.txt').write_text(ideas, encoding='utf-8')
          print(ideas)

          linear_key = os.environ.get('LINEAR_API_KEY', '')
          cfg_path = Path(os.environ['LINEAR_CONFIG_PATH'])
          if linear_key and cfg_path.exists():
              cfg = json.loads(cfg_path.read_text())
              team_id = cfg.get('teamId') or cfg.get('team_id')
              project_id = cfg.get('projectId') or cfg.get('project_id')
              label_ids_map = cfg.get('labelIds') or cfg.get('label_ids') or {}
              label_id = label_ids_map.get('auto-idea')
              if not team_id:
                  print('Linear config missing teamId/team_id, skipping Linear push')
              else:
                  def gql(q, v=None):
                      p = json.dumps({'query': q, 'variables': v or {}}).encode()
                      rq = urllib.request.Request('https://api.linear.app/graphql', data=p,
                          headers={'Content-Type': 'application/json', 'Authorization': linear_key})
                      with urllib.request.urlopen(rq) as r:
                          return json.loads(r.read())
                  for chunk in re.split(r'\n(?=\d+\.)', ideas.strip()):
                      if not chunk.strip():
                          continue
                      lines = chunk.strip().splitlines()
                      title = lines[0].lstrip('0123456789. ').strip()[:200]
                      body = '\n'.join(lines[1:]).strip()
                      gql('mutation($t:String!,$p:String,$ti:String!,$d:String!,$l:[String!]){issueCreate(input:{teamId:$t,projectId:$p,title:$ti,description:$d,labelIds:$l}){success}}', {
                          't': team_id, 'p': project_id,
                          'ti': f'[auto-idea] {title}',
                          'd': body,
                          'l': [label_id] if label_id else []
                      })
                      print(f'Linear: created "{title}"')
          else:
              print('Linear not configured or config missing, skipping Linear push')
          PYEOF
      - name: Open ideas PR
        if: steps.keycheck.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WHITEBOARD_FILE: ${{ inputs.whiteboard_file }}
        run: |
          set -e
          DATE=$(date +%Y-%m-%d)
          BRANCH="bot/ideas-${DATE}-${{ github.run_id }}"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b "$BRANCH"
          IDEAS=$(cat /tmp/ideas.txt)
          {
            echo ''
            echo "## Auto-generated ideas - $DATE"
            echo ''
            echo "$IDEAS"
          } >> "$WHITEBOARD_FILE"
          git add "$WHITEBOARD_FILE"
          git commit -m "bot: auto-generated ideas $DATE"
          git push origin "$BRANCH"
          gh pr create --title "Auto-ideas $DATE" --body "Auto-generated by idea-generation reusable workflow." --base ${{ github.event.repository.default_branch }} --head "$BRANCH" --draft || echo 'PR create failed, branch pushed'
